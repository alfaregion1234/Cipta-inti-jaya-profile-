/* ============================================================
   CV CIPTA INTI JAYA — COMPLETE WEBSITE + PRODUCT CATALOG
   Modern Industrial Construction Design
   ============================================================ */

:root {
    /* Blues */
    --b50:#eff6ff;--b100:#dbeafe;--b200:#bfdbfe;--b300:#93c5fd;
    --b400:#60a5fa;--b500:#3b82f6;--b600:#2563eb;--b700:#1d4ed8;
    --b800:#1e40af;--b900:#1e3a8a;--b950:#0f2554;
    /* Slate */
    --s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;
    --s400:#94a3b8;--s500:#64748b;--s600:#475569;--s700:#334155;
    --s800:#1e293b;--s900:#0f172a;--s950:#020617;
    /* Accents */
    --amber:#f59e0b;--amber-l:#fbbf24;--amber-d:#d97706;
    --green:#22c55e;--green-d:#16a34a;--red:#ef4444;
    /* Semantic */
    --primary:var(--b700);--primary-h:var(--b800);--primary-l:var(--b400);
    --white:#fff;--dark:var(--s900);--text:var(--s700);
    --text-l:var(--s500);--text-m:var(--s400);--border:var(--s200);
    /* Shadows */
    --sh-xs:0 1px 2px rgba(0,0,0,.05);
    --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --sh-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
    --sh-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.04);
    --sh-xl:0 20px 25px -5px rgba(0,0,0,.08),0 8px 10px -6px rgba(0,0,0,.04);
    --sh-2xl:0 25px 50px -12px rgba(0,0,0,.15);
    --sh-blue:0 10px 40px -10px rgba(29,78,216,.35);
    --sh-glow:0 0 30px rgba(59,130,246,.15);
    /* Radius */
    --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--r-2xl:28px;--r-full:9999px;
    /* Type */
    --f:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
    --fm:'JetBrains Mono',ui-monospace,monospace;
    /* Motion */
    --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
    --dur:.3s;
    /* Layout */
    --nav-h:72px;--max-w:1240px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:var(--nav-h);-webkit-text-size-adjust:100%}
body{font-family:var(--f);font-size:16px;line-height:1.7;color:var(--text);background:var(--white);overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit;transition:var(--dur) var(--ease)}
img{max-width:100%;display:block}
ul{list-style:none}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--b200);color:var(--b900)}
.container{width:100%;max-width:var(--max-w);margin:0 auto;padding:0 24px}

/* ---- PRELOADER ---- */
#preloader{position:fixed;inset:0;z-index:99999;background:var(--s950);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .6s var(--ease),visibility .6s}
#preloader.done{opacity:0;visibility:hidden;pointer-events:none}
.pre-ring{width:52px;height:52px;border:3px solid rgba(59,130,246,.12);border-top-color:var(--b400);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pre-txt{text-align:center;color:var(--white)}
.pre-txt strong{display:block;font-size:.95rem;font-weight:700;letter-spacing:2.5px}
.pre-txt span{font-size:.68rem;color:var(--s400);letter-spacing:1.5px;text-transform:uppercase}

/* ---- NAV ---- */
#nav{position:fixed;top:0;left:0;width:100%;z-index:5000;transition:var(--dur) var(--ease)}
#nav.stuck{background:rgba(15,23,42,.93);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid rgba(255,255,255,.06)}
.nav-in{max-width:var(--max-w);margin:0 auto;padding:0 24px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;gap:20px}

.nav-brand{display:flex;align-items:center;gap:12px;color:var(--white)}
.brand-ico{width:40px;height:40px;background:linear-gradient(135deg,var(--b600),var(--b800));border-radius:var(--r-md);display:grid;place-items:center;font-size:1rem;box-shadow:var(--sh-blue)}
.brand-t strong{display:block;font-size:.82rem;font-weight:800;letter-spacing:.5px;line-height:1.2}
.brand-t small{font-size:.6rem;color:var(--s400);font-weight:500;letter-spacing:.3px;text-transform:uppercase}

.nav-links{display:flex;align-items:center;gap:2px}
.nav-links a{padding:7px 14px;border-radius:var(--r-sm);font-size:.82rem;font-weight:500;color:rgba(255,255,255,.6);transition:var(--dur) var(--ease)}
.nav-links a:hover,.nav-links a.on{color:var(--white);background:rgba(255,255,255,.08)}

.nav-r{display:flex;align-items:center;gap:10px}
.nav-wa{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;background:var(--green);color:var(--white);border-radius:var(--r-sm);font-size:.82rem;font-weight:600}
.nav-wa:hover{background:var(--green-d);transform:translateY(-1px)}

.ham{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:6px}
.ham span{width:22px;height:2px;background:var(--white);border-radius:2px;transition:var(--dur) var(--ease);transform-origin:center}
.ham.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.ham.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.ham.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* ---- HERO ---- */
#hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--s950);overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(29,78,216,.25),transparent),radial-gradient(ellipse 60% 50% at 80% 20%,rgba(59,130,246,.2),transparent),radial-gradient(ellipse 40% 40% at 50% 50%,rgba(245,158,11,.08),transparent)}
.hero-grd{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 70% 70% at center,black 30%,transparent 70%);-webkit-mask-image:radial-gradient(ellipse 70% 70% at center,black 30%,transparent 70%)}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:orbF 12s ease-in-out infinite;will-change:transform}
.orb-1{width:600px;height:600px;background:rgba(29,78,216,.2);top:-200px;right:-150px}
.orb-2{width:400px;height:400px;background:rgba(245,158,11,.12);bottom:-100px;left:-100px;animation-delay:-4s;animation-duration:15s}
.orb-3{width:300px;height:300px;background:rgba(59,130,246,.15);top:40%;left:30%;animation-delay:-8s;animation-duration:18s}
@keyframes orbF{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-40px) scale(1.05)}50%{transform:translate(-20px,30px) scale(.95)}75%{transform:translate(40px,20px) scale(1.02)}}

.hero-body{position:relative;z-index:2;text-align:center;padding:140px 24px 100px;max-width:860px}
.hero-chip{display:inline-flex;align-items:center;gap:8px;padding:7px 18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-full);color:var(--b300);font-size:.74rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:32px;backdrop-filter:blur(12px)}
.hero-h1{font-size:clamp(2.2rem,6vw,4.2rem);font-weight:900;color:var(--white);line-height:1.12;margin-bottom:12px;letter-spacing:-.02em}
.hero-h1-sub{font-size:clamp(1rem,2.5vw,1.4rem);font-weight:600;color:var(--b300);margin-bottom:10px;font-family:var(--fm);letter-spacing:1px;text-transform:uppercase}
.grad{background:linear-gradient(135deg,var(--b300),var(--amber-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(.95rem,2vw,1.15rem);color:var(--s400);margin-bottom:40px;max-width:540px;margin-left:auto;margin-right:auto;line-height:1.7}
.hero-acts{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:50px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:9px;padding:13px 30px;border-radius:var(--r-md);font-size:.92rem;font-weight:600;border:none;transition:var(--dur) var(--ease);white-space:nowrap}
.btn-fill{background:var(--primary);color:var(--white);box-shadow:var(--sh-blue)}
.btn-fill:hover{background:var(--primary-h);transform:translateY(-2px);box-shadow:0 14px 40px -8px rgba(29,78,216,.45)}
.btn-ghost{background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,.2)}
.btn-ghost:hover{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.06);transform:translateY(-2px)}
.btn-wa{display:inline-flex;align-items:center;gap:10px;width:100%;justify-content:center;padding:15px 32px;background:#25D366;color:var(--white);border-radius:var(--r-md);font-size:.95rem;font-weight:700;border:none;margin-top:20px}
.btn-wa:hover{background:#1ebe5d;transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,211,102,.3)}

/* Hero Metrics */
.hero-mets{display:flex;align-items:center;justify-content:center;gap:28px;flex-wrap:wrap;margin-bottom:40px}
.met{text-align:center}
.met-v{display:block;font-size:1.5rem;font-weight:800;color:var(--white);line-height:1.2}
.met-l{font-size:.72rem;color:var(--s500);font-weight:500}
.met-sep{width:1px;height:36px;background:rgba(255,255,255,.1)}

/* Product List Badge in Hero */
.hero-products{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
.hero-prod-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-full);color:var(--s300);font-size:.72rem;font-weight:600;letter-spacing:.3px;backdrop-filter:blur(8px);transition:var(--dur) var(--ease)}
.hero-prod-tag:hover{background:rgba(59,130,246,.15);border-color:var(--b400);color:var(--white)}
.hero-prod-tag i{font-size:.65rem;color:var(--b400)}

.scroll-cue{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--s500);font-size:.68rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;animation:bounce 2.5s infinite}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(10px)}}

/* ---- SECTIONS ---- */
section{padding:100px 0}
.sh{text-align:center;margin-bottom:60px}
.sh-tag{display:inline-flex;align-items:center;gap:7px;font-size:.73rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px}
.sh-title{font-size:clamp(1.7rem,4vw,2.5rem);font-weight:800;color:var(--dark);line-height:1.2;letter-spacing:-.01em;margin-bottom:14px}
.sh-desc{font-size:1rem;color:var(--text-l);max-width:580px;margin:0 auto;line-height:1.7}
.bg-w{background:var(--white)}
.bg-s{background:var(--s50)}
.bg-d{background:var(--s900);color:var(--white)}
.bg-d .sh-tag{color:var(--amber)}
.bg-d .sh-title{color:var(--white)}
.bg-d .sh-desc{color:var(--s400)}

/* ---- ABOUT ---- */
.ab-row{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.ab-text p{font-size:1rem;color:var(--s600);margin-bottom:14px;line-height:1.85}
.ab-text strong{color:var(--dark)}
.ab-pills{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px}
.pill{display:flex;align-items:center;gap:10px;padding:11px 15px;background:var(--b50);border-radius:var(--r-md);font-size:.84rem;font-weight:600;color:var(--b800);border:1px solid var(--b100);transition:var(--dur) var(--ease)}
.pill:hover{background:var(--primary);color:var(--white);border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--sh-blue)}
.pill i{width:18px;text-align:center;font-size:.88rem}

.ab-vis{display:flex;justify-content:center}
.vis-card{width:100%;max-width:400px;background:linear-gradient(150deg,var(--b800),var(--b600));border-radius:var(--r-2xl);padding:48px 36px;color:var(--white);text-align:center;box-shadow:var(--sh-2xl);position:relative;overflow:hidden}
.vis-card::before{content:'';position:absolute;width:300px;height:300px;background:rgba(255,255,255,.04);border-radius:50%;top:-100px;right:-100px}
.vis-card::after{content:'';position:absolute;width:200px;height:200px;background:rgba(255,255,255,.03);border-radius:50%;bottom:-60px;left:-60px}
.vis-ico{width:72px;height:72px;background:rgba(255,255,255,.12);border-radius:var(--r-xl);display:grid;place-items:center;font-size:1.7rem;margin:0 auto 22px;position:relative;z-index:1}
.vis-card h3{font-size:1.3rem;font-weight:800;margin-bottom:6px;position:relative;z-index:1;line-height:1.3}
.vis-card>p{font-size:.85rem;opacity:.65;position:relative;z-index:1}
.vis-line{width:50px;height:3px;background:var(--amber);margin:22px auto;border-radius:3px;position:relative;z-index:1}
.vis-btm{position:relative;z-index:1}
.vis-btm strong{display:block;font-size:.86rem;letter-spacing:.8px}
.vis-btm small{font-size:.74rem;opacity:.55}

/* ---- PRODUCTS ---- */
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}

.pcard{background:var(--white);border-radius:var(--r-xl);padding:0;border:1px solid var(--s200);position:relative;overflow:hidden;transition:var(--dur) var(--ease);display:flex;flex-direction:column}
.pcard::after{content:'';position:absolute;top:0;left:0;width:100%;height:4px;background:linear-gradient(90deg,var(--b600),var(--b400));transform:scaleX(0);transform-origin:left;transition:transform .45s var(--ease)}
.pcard:hover{transform:translateY(-10px);box-shadow:var(--sh-xl);border-color:var(--b100)}
.pcard:hover::after{transform:scaleX(1)}

.pcard-head{padding:32px 28px 0;position:relative}
.pcard-num{position:absolute;top:16px;right:20px;font-size:2.6rem;font-weight:800;color:var(--s100);font-family:var(--fm);line-height:1;user-select:none;transition:var(--dur) var(--ease)}
.pcard:hover .pcard-num{color:var(--b50)}

.pcard-ico{width:52px;height:52px;background:var(--b50);border-radius:var(--r-md);display:grid;place-items:center;font-size:1.25rem;color:var(--primary);margin-bottom:18px;transition:var(--dur) var(--ease)}
.pcard:hover .pcard-ico{background:var(--primary);color:var(--white);transform:scale(1.08);box-shadow:var(--sh-blue)}

.pcard-name{font-size:1.12rem;font-weight:800;color:var(--dark);margin-bottom:4px}
.pcard-code{display:inline-block;font-size:.7rem;font-weight:600;color:var(--primary);background:var(--b50);padding:3px 10px;border-radius:var(--r-full);margin-bottom:4px;font-family:var(--fm);letter-spacing:.5px;border:1px solid var(--b100)}
.pcard-cat{display:inline-block;font-size:.68rem;font-weight:500;color:var(--s400);margin-bottom:12px;margin-left:4px}

.pcard-body{padding:0 28px 24px;flex:1;display:flex;flex-direction:column}
.pcard-desc{font-size:.86rem;color:var(--s500);line-height:1.7;margin-bottom:16px;flex:1}
.pcard-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.ptag{font-size:.68rem;font-weight:600;padding:4px 10px;border-radius:var(--r-full);background:var(--s100);color:var(--s600);transition:var(--dur) var(--ease)}
.pcard:hover .ptag{background:var(--b50);color:var(--b800)}

/* Safety mini in card */
.pcard-safe{padding:14px 16px;background:var(--s50);border-radius:var(--r-md);border:1px solid var(--s200);margin-top:auto}
.pcard-safe-title{font-size:.68rem;font-weight:700;color:var(--amber-d);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pcard-safe-title i{font-size:.6rem}
.pcard-safe-list{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pcard-safe-list span{font-size:.65rem;color:var(--s500);display:flex;align-items:center;gap:5px}
.pcard-safe-list span i{font-size:.55rem;color:var(--amber)}

/* Product Detail Button */
.pcard-detail-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;margin:0 28px 24px;background:var(--b50);color:var(--primary);border:1px solid var(--b100);border-radius:var(--r-md);font-size:.8rem;font-weight:600;transition:var(--dur) var(--ease);cursor:pointer}
.pcard-detail-btn:hover{background:var(--primary);color:var(--white);border-color:var(--primary)}

/* ---- PRODUCT MODAL ---- */
.modal-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.6);b
